{% extends "layout/base.html" %}

{% block 'title' %} Edit Gender Page {% endblock 'title' %}

{% block 'content' %}
{% include "include/sidebar.html" %}
{% include "include/ToastMessage.html" %}

<div class="p-2 sm:ml-64 mt-16 md:mt-14">
  <form action="/gender/edit/{{gender.gender_id}}" method="post">

    {% csrf_token %}

    <div class="mx-auto w-full md:w-1/3 mb-4">
      <label for="gender" class="block text-sm font-medium text-gray-700 mb-2">
        Gender
      </label>

      <input type="text"
             name="gender"
             placeholder="Enter gender"
             id="gender"
             value ="{{gender.gender}}"
             class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-lg w-full
                    focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" />

      <div class="flex justify-end mt-3">
        <a href="/gender/list"
        class="px-4 py-2 mr-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition duration-200">
        Back</a>

        <button type="submit"
                class="bg-green-800 hover:bg-green-500 active:scale-95 text-sm font-semibold text-white px-3 py-2 rounded-lg
                    shadow-md hover:shadow-lg transition-all duration-200">
          Save Gender
        </button>
      </div>

    </div>
  </form>
</div>
{% endblock 'content' %}
