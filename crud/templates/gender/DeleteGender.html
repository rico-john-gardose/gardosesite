{% extends "layout/base.html" %}

{% block 'title' %} Delete Gender Page {% endblock 'title' %}

{% block 'content' %}
{% include "include/sidebar.html" %}
{% include "include/ToastMessage.html" %}

<div class="min-h-screen bg-[#A6A6B3] flex justify-center items-start pt-24 pl-64">
  <div class="bg-white shadow-lg rounded-2xl overflow-hidden border border-gray-100  w-full md:w-[65%] mx-auto">
    <div class="px-6 py-4 border-b bg-[#3C3C45]">
      <h1 class="text-white text-lg font-bold">Delete Gender</h1>
    </div>
    <form action="/gender/delete/{{ gender.gender_id }}" method="post">
      {% csrf_token %}
      <div class="bg-white mx-auto w-full md:w-1/3 mb-10 mt-10 ">
        <label for="gender" class="block text-sm font-bold text-black mb-2">Gender</label>

      <input type="text" name="gender" placeholder="Enter gender" id="gender" value = "{{gender.gender}}"
             class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-lg w-full
              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" />

      <div class="flex justify-end mt-3"><a href="/gender/list" class="px-4 py-2 mr-2 text-sm text-white 
        bg-blue-600 rounded-lg hover:bg-blue-700 transition duration-200"> Back</a>
        <button type="submit" class="bg-orange-500 hover:bg-red-600 active:scale-95 text-sm font-semibold text-white px-3 py-2 rounded-lg 
        shadow-md hover:shadow-lg transition-all duration-200">Delete Gender</button>
      </div>

    </div>
  </form>
</div>
{% endblock 'content' %}
