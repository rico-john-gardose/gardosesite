{% extends "layout/base.html" %}

{% block 'title' %} Add Gender Page {% endblock 'title' %}

{% block 'content' %}
{% include "include/sidebar.html" %}
{% include "include/ToastMessage.html" %}

<div class="min-h-screen bg-[#A6A6B3] flex justify-center items-start pt-24 pl-64">
  <div class="bg-white shadow-lg rounded-2xl overflow-hidden border border-gray-100  w-full md:w-[65%] mx-auto">
    <div class="px-6 py-4 border-b bg-[#3C3C45]">
      <h1 class="text-white text-lg font-bold">Add Gender</h1>
    </div>
    <form action="/gender/add" method="post">
      {% csrf_token %}
      <div class="bg-white mx-auto w-full md:w-1/3 mb-10 mt-10 ">
        <label for="gender" class="block text-sm font-bold text-black mb-2">Gender</label>

        <input type="text" name="gender" placeholder="Enter gender" id="gender"
              class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-lg w-full
                focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" />

        <div class="flex justify-end mt-3">
          <button type="submit"
                  class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-sm font-semibold 
                  text-white px-5 py-2.5 rounded-lg shadow-md transition duration-200">Save Gender</button>
        </div>
      
      </div>
    </form>
  </div>
</div>
{% endblock 'content' %}
