{% extends "layout/base.html" %}

{% block 'title' %} Add Gender Page {% endblock 'title' %}

{% block 'content' %}
{% include "include/sidebar.html" %}
{% include "include/ToastMessage.html" %}

<div class="p-2 sm:ml-64 mt-16 md:mt-14">
  <form action="/gender/add" method="post">
    {% csrf_token %}
    <div class="mx-auto w-full md:w-1/3 mb-4">
      <label for="gender" class="block text-sm font-medium text-gray-700 mb-2">
        Gender
      </label>

      <input type="text"
             name="gender"
             placeholder="Enter gender"
             id="gender"
             class="bg-white px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-lg w-full
                    focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" />

      <div class="flex justify-end mt-3">
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-sm font-semibold
                       text-white px-5 py-2.5 rounded-lg shadow-md transition duration-200">
          Save Gender
        </button>
      </div>
      
    </div>
  </form>
</div>
{% endblock 'content' %}
